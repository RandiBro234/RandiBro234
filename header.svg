<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&amp;family=Share+Tech+Mono&amp;display=swap');
    </style>

    <!-- Scanline pattern -->
    <pattern id="scanlines" x="0" y="0" width="900" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="900" height="3" fill="none"/>
      <rect x="0" y="3" width="900" height="1" fill="#00ffe0" opacity="0.04"/>
    </pattern>

    <!-- Grid pattern -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00ffe0" stroke-width="0.3" opacity="0.12"/>
    </pattern>

    <!-- Clip for glitch red -->
    <clipPath id="clip-red">
      <rect x="0" y="100" width="900" height="28"/>
    </clipPath>
    <!-- Clip for glitch cyan -->
    <clipPath id="clip-cyan">
      <rect x="0" y="148" width="900" height="18"/>
    </clipPath>

    <filter id="glow-cyan">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="#07080f"/>
  <rect width="900" height="280" fill="url(#grid)"/>
  <rect width="900" height="280" fill="url(#scanlines)"/>

  <!-- Accent lines top -->
  <line x1="0" y1="0" x2="900" y2="0" stroke="#00ffe0" stroke-width="2"/>
  <line x1="0" y1="3" x2="900" y2="3" stroke="#00ffe0" stroke-width="0.5" opacity="0.4"/>

  <!-- Accent lines bottom -->
  <line x1="0" y1="277" x2="900" y2="277" stroke="#ff2d55" stroke-width="2"/>
  <line x1="0" y1="274" x2="900" y2="274" stroke="#ff2d55" stroke-width="0.5" opacity="0.4"/>

  <!-- Corner brackets TL -->
  <polyline points="18,36 18,16 38,16" fill="none" stroke="#00ffe0" stroke-width="2"/>
  <!-- Corner brackets TR -->
  <polyline points="862,16 882,16 882,36" fill="none" stroke="#00ffe0" stroke-width="2"/>
  <!-- Corner brackets BL -->
  <polyline points="18,244 18,264 38,264" fill="none" stroke="#ff2d55" stroke-width="2"/>
  <!-- Corner brackets BR -->
  <polyline points="862,264 882,264 882,244" fill="none" stroke="#ff2d55" stroke-width="2"/>

  <!-- SYSTEM tag -->
  <text x="450" y="52" font-family="'Share Tech Mono', 'Courier New', monospace" font-size="11" fill="#00ffe0" opacity="0.6" text-anchor="middle" letter-spacing="5">SYSTEM // INIT ▶ USER_PROFILE.EXE</text>

  <!-- Main Name — white base -->
  <text x="450" y="132" font-family="'Share Tech Mono', 'Courier New', monospace" font-size="52" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="4">RANDI NANDIKA DANENDRA</text>

  <!-- Glitch red layer -->
  <text x="447" y="132" font-family="'Share Tech Mono', 'Courier New', monospace" font-size="52" font-weight="900" fill="#ff2d55" text-anchor="middle" letter-spacing="4" opacity="0.85" clip-path="url(#clip-red)">RANDI NANDIKA DANENDRA</text>

  <!-- Glitch cyan layer -->
  <text x="453" y="132" font-family="'Share Tech Mono', 'Courier New', monospace" font-size="52" font-weight="900" fill="#00ffe0" text-anchor="middle" letter-spacing="4" opacity="0.85" clip-path="url(#clip-cyan)">RANDI NANDIKA DANENDRA</text>

  <!-- Glow name -->
  <text x="450" y="132" font-family="'Share Tech Mono', 'Courier New', monospace" font-size="52" font-weight="900" fill="none" stroke="#00ffe0" stroke-width="0.5" text-anchor="middle" letter-spacing="4" opacity="0.3">RANDI NANDIKA DANENDRA</text>

  <!-- Divider line -->
  <line x1="180" y1="152" x2="720" y2="152" stroke="#00ffe0" stroke-width="0.5" opacity="0.3"/>

  <!-- Subtitle tags -->
  <!-- Applied Data Science pill -->
  <rect x="205" y="162" width="188" height="26" fill="none" stroke="#00ffe0" stroke-width="1" opacity="0.5"/>
  <rect x="206" y="163" width="186" height="24" fill="#00ffe0" opacity="0.08"/>
  <text x="299" y="179" font-family="'Share Tech Mono', 'Courier New', monospace" font-size="11" fill="#00ffe0" text-anchor="middle" letter-spacing="2">APPLIED DATA SCIENCE</text>

  <!-- Separator -->
  <text x="406" y="179" font-family="monospace" font-size="14" fill="#ffffff" opacity="0.3" text-anchor="middle">//</text>

  <!-- EEPIS pill -->
  <rect x="420" y="162" width="148" height="26" fill="none" stroke="#ff2d55" stroke-width="1" opacity="0.5"/>
  <rect x="421" y="163" width="146" height="24" fill="#ff2d55" opacity="0.08"/>
  <text x="494" y="179" font-family="'Share Tech Mono', 'Courier New', monospace" font-size="11" fill="#ff2d55" text-anchor="middle" letter-spacing="2">EEPIS SURABAYA</text>

  <!-- Separator -->
  <text x="581" y="179" font-family="monospace" font-size="14" fill="#ffffff" opacity="0.3" text-anchor="middle">//</text>

  <!-- Semester pill -->
  <rect x="595" y="162" width="100" height="26" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
  <text x="645" y="179" font-family="'Share Tech Mono', 'Courier New', monospace" font-size="11" fill="#ffffff" text-anchor="middle" letter-spacing="2" opacity="0.5">SEMESTER 4</text>

  <!-- Bottom info row -->
  <!-- IG -->
  <text x="200" y="235" font-family="'Share Tech Mono', 'Courier New', monospace" font-size="10" fill="#ffffff" opacity="0.35" text-anchor="middle" letter-spacing="2">IG</text>
  <text x="200" y="252" font-family="'Share Tech Mono', 'Courier New', monospace" font-size="12" fill="#ff2d55" text-anchor="middle" letter-spacing="1">@randika234_</text>

  <line x1="295" y1="230" x2="295" y2="255" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>

  <!-- MAIL -->
  <text x="450" y="235" font-family="'Share Tech Mono', 'Courier New', monospace" font-size="10" fill="#ffffff" opacity="0.35" text-anchor="middle" letter-spacing="2">MAIL</text>
  <text x="450" y="252" font-family="'Share Tech Mono', 'Courier New', monospace" font-size="12" fill="#00ffe0" text-anchor="middle" letter-spacing="1">randizelda30@gmail.com</text>

  <line x1="620" y1="230" x2="620" y2="255" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>

  <!-- DATA ENTHUSIAST -->
  <text x="760" y="235" font-family="'Share Tech Mono', 'Courier New', monospace" font-size="10" fill="#ffffff" opacity="0.35" text-anchor="middle" letter-spacing="2">STATUS</text>
  <text x="760" y="252" font-family="'Share Tech Mono', 'Courier New', monospace" font-size="12" fill="#00ffe0" text-anchor="middle" letter-spacing="1">DATA ENTHUSIAST</text>
</svg>
